<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Vision - Client Registration</title>
    <style>
        :root {
            --primary: #1a252f; /* Deep Construction Slate */
            --accent: #f39c12;  /* High-Vision Safety Orange */
            --light: #f8f9fa;
            --dark: #2c3e50;
            --text: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #fff;
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-top: 5px solid var(--accent);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo-placeholder {
            width: 80px;
            height: 80px;
            background: var(--primary);
            color: #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 10px auto;
            font-weight: bold;
            font-size: 12px;
            border: 3px solid var(--accent);
        }

        .header h1 {
            font-size: 24px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header p {
            font-size: 14px;
            color: #777;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
            color: var(--dark);
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            transition: border 0.3s;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: var(--primary);
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #e67e22;
        }

        #result-message {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
        }

        .admin-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            font-size: 11px;
        }

        .admin-link a {
            color: #bbb;
            text-decoration: none;
        }

        .admin-link a:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <!-- Replace this later with your hosted logo image: <img src="logo.png" alt="High Vision Logo"> -->
            <div class="logo-placeholder">HIGH VISION</div>
            <h1>High Vision</h1>
            <p>Client Project Registration</p>
        </div>

        <!-- Form sends data securely via Web3Forms API -->
        <form action="https://api.web3forms.com/submit" method="POST" id="registrationForm">
            
            <!-- STEP 1: Put your Web3Forms Access Key Here -->
            <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">
            
            <!-- Email Customization Settings -->
            <input type="hidden" name="subject" value="🚀 New Client Registration - High Vision">
            <input type="hidden" name="from_name" value="High Vision Portal">

            <div class="form-group">
                <label for="name">Full Name / Company Name</label>
                <input type="text" name="Client Name" id="name" required placeholder="John Doe or Acme Corp">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" name="Client Email" id="email" required placeholder="name@example.com">
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" name="Client Phone" id="phone" required placeholder="+1 (555) 000-0000">
            </div>

            <div class="form-group">
                <label for="project">Project Type</label>
                <select name="Project Type" id="project">
                    <option value="Commercial Building">Commercial Building</option>
                    <option value="Residential Home">Residential / House</option>
                    <option value="Renovation / Remodeling">Renovation / Remodeling</option>
                    <option value="Infrastructure / Other">Infrastructure / Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">Brief Project Description</label>
                <textarea name="Project Description" id="message" rows="4" placeholder="Tell us about your construction needs..."></textarea>
            </div>

            <button type="submit">Submit Registration</button>
            
            <div id="result-message"></div>
        </form>

        <!-- Secret direct shortcut link to log into your Web3Forms submission log panel -->
        <div class="admin-link">
            <a href="https://web3forms.com/login" target="_blank">🔒 Admin Dashboard Login</a>
        </div>
    </div>

    <!-- AJAX script to process submission data seamlessly without breaking layouts -->
    <script>
        const form = document.getElementById('registrationForm');
        const result = document.getElementById('result-message');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(form);
            result.style.color = "var(--primary)";
            result.innerHTML = "Processing registration details...";

            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                body: formData
            })
            .then(async (response) => {
                let json = await response.json();
                if (response.status == 200) {
                    result.style.color = "green";
                    result.innerHTML = "Success! Your project details have been logged.";
                    form.reset();
                } else {
                    console.log(response);
                    result.style.color = "red";
                    result.innerHTML = json.message;
                }
            })
            .catch(error => {
                console.log(error);
                result.style.color = "red";
                result.innerHTML = "Network connection error. Please try again.";
            });
        });
    </script>
</body>
</html>
