<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Vision | Autonomous Exam Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --primary: #f2a900;       
            --dark-bg: #0f172a;      
            --card-bg: #1e293b;      
            --text-main: #f8fafc;    
            --text-muted: #94a3b8;   
            --success: #10b981;      
            --error: #ef4444;        
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #020617;
            padding: 1.25rem 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #1e293b;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #ffffff;
        }

        .logo span {
            color: var(--primary);
        }

        .portal-tag {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            font-weight: 600;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        .quiz-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 750px;
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border-left: 5px solid var(--primary);
        }

        .progress-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .progress-text {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary);
        }

        .progress-bar-outer {
            width: 100%;
            height: 6px;
            background-color: #0f172a;
            border-radius: 10px;
            margin-top: 0.5rem;
            overflow: hidden;
        }

        .progress-bar-inner {
            height: 100%;
            width: 0%;
            background-color: var(--primary);
            transition: width 0.4s ease;
        }

        .question-text {
            font-size: 1.35rem;
            font-weight: 600;
            line-height: 1.45;
            margin-bottom: 2rem;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            list-style: none;
        }

        .option-btn {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: var(--text-main);
            padding: 1.2rem 1.5rem;
            border-radius: 8px;
            text-align: left;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not([disabled]) {
            border-color: var(--primary);
            background-color: #1e293b;
            transform: translateX(4px);
        }

        .option-btn.correct {
            background-color: rgba(16, 185, 129, 0.15) !important;
            border-color: var(--success) !important;
            color: #10b981;
            font-weight: 600;
        }

        .option-btn.incorrect {
            background-color: rgba(239, 68, 68, 0.15) !important;
            border-color: var(--error) !important;
            color: #ef4444;
        }

        .rationale-box {
            margin-top: 1.5rem;
            padding: 1.25rem;
            background-color: #0f172a;
            border-radius: 6px;
            border-left: 3px solid var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            display: none;
        }

        .rationale-box.visible {
            display: block;
        }

        .action-wrapper {
            margin-top: 2rem;
            display: flex;
            justify-content: flex-end;
        }

        .next-btn {
            background-color: var(--primary);
            color: #020617;
            border: none;
            padding: 0.85rem 2rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results-screen {
            text-align: center;
            display: none;
        }

        .results-screen h2 {
            font-size: 2.25rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .score-display {
            font-size: 4rem;
            font-weight: 700;
            margin: 1.5rem 0;
            color: #ffffff;
        }

        .results-summary-text {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 500px;
            margin: 0 auto 2rem auto;
            line-height: 1.6;
        }

        .restart-btn {
            background-color: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 0.85rem 2.5rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .restart-btn:hover {
            background-color: var(--primary);
            color: #020617;
        }

        footer {
            background-color: #020617;
            text-align: center;
            padding: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-top: 1px solid #1e293b;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">HIGH<span>VISION</span></div>
        <div class="portal-tag">Algorithmic Math Generator</div>
    </header>

    <main>
        <div class="quiz-container">
            <div id="quiz-window">
                <div class="progress-wrapper">
                    <span class="progress-text" id="question-counter">Question 1 of 20</span>
                </div>
                <div class="progress-bar-outer">
                    <div class="progress-bar-inner" id="progress-bar"></div>
                </div>
                
                <div style="margin-top: 2rem;">
                    <h2 class="question-text" id="question-field">Compiling procedural algorithm parameters...</h2>
                    <div class="options-list" id="options-field"></div>
                </div>

                <div class="rationale-box" id="rationale-field"></div>

                <div class="action-wrapper">
                    <button class="next-btn" id="next-btn" disabled>Submit Answer</button>
                </div>
            </div>

            <div id="results-window" class="results-screen">
                <h2>Evaluation Complete</h2>
                <p>Mathematical Construction Diagnostics Dashboard</p>
                <div class="score-display"><span id="final-score">0</span> / 20</div>
                <p class="results-summary-text" id="performance-feedback">Processing data...</p>
                <button class="restart-btn" onclick="resetExamEngine()">Generate Completely New Exam Set</button>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 High Vision AI Infrastructure Systems. Real-Time Math Automation Active.
    </footer>

    <script>
        const TOTAL_QUESTIONS = 20;
        let currentQuestionIndex = 0;
        let runningScore = 0;
        let isAnswerSelected = false;
        let activeExamSet = [];

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // --- Algorithmic Template Generation Logic ---
        const questionGenerators = [
            function() {
                const cement = Math.floor(Math.random() * 150) + 300; 
                const ratio = (Math.floor(Math.random() * 20) + 40) / 100; 
                const correctWater = parseFloat((cement * ratio).toFixed(1));
                return {
                    question: `A batch of fresh concrete requires ${cement} kg of cement. If the structural specification demands a Water-to-Cement (W/C) ratio of exactly ${ratio}, calculate the precise weight of water needed for optimal hydration matrix mix.`,
                    correctAnswer: `${correctWater} kg`,
                    distractors: [`${(correctWater + 25.5).toFixed(1)} kg`, `${(correctWater - 18.2).toFixed(1)} kg`, `${(cement * 0.35).toFixed(1)} kg`],
                    rationale: `Water weight is calculated by multiplying the cement weight by the target ratio: ${cement} * ${ratio} = ${correctWater} kg.`
                };
            },
            function() {
                const earlyStart = Math.floor(Math.random() * 10) + 5; 
                const duration = Math.floor(Math.random() * 12) + 4;
                const lateFinish = earlyStart + duration + Math.floor(Math.random() * 6) + 2;
                const earlyFinish = earlyStart + duration;
                const correctFloat = lateFinish - earlyFinish;
                return {
                    question: `An infrastructure task has an Early Start (ES) day of ${earlyStart}, a duration of ${duration} days, and a Late Finish (LF) deadline of day ${lateFinish}. Calculate the Total Float value for this task.`,
                    correctAnswer: `${correctFloat} days`,
                    distractors: [`${correctFloat + 3} days`, `0 days`, `${Math.abs(earlyStart - duration)} days`],
                    rationale: `Early Finish (EF) = ES + Duration (${earlyStart} + ${duration} = ${earlyFinish}). Total Float = LF - EF (${lateFinish} - ${earlyFinish} = ${correctFloat} days).`
                };
            },
            function() {
                const height = Math.floor(Math.random() * 5) + 3; 
                const density = 10; 
                const pressure = height * density;
                return {
                    question: `A subterranean concrete retaining wall holds back liquid-saturated silty earth with a height profile of ${height} meters. Taking the hydrostatic weight fluid density parameter as ${density} kN/m³, what is the maximum lateral horizontal pressure at the absolute bottom heel point of the wall?`,
                    correctAnswer: `${pressure} kN/m²`,
                    distractors: [`${(pressure / 2).toFixed(1)} kN/m²`, `${(pressure * 1.5).toFixed(1)} kN/m²`, `${pressure + 15} kN/m²`],
                    rationale: `Hydrostatic base fluid pressure climbs linearly with depth: Pressure = Density * Height (${density} * ${height} = ${pressure} kN/m²).`
                };
            },
            function() {
                const length = Math.floor(Math.random() * 6) + 4; 
                const load = Math.floor(Math.random() * 15) + 10; 
                const maxBendingMoment = parseFloat(((load * length * length) / 8).toFixed(1));
                return {
                    question: `A simply supported structural steel horizontal layout beam spans a distance of ${length} meters. It supports a uniform dead load configuration of ${load} kN/m across its entire horizontal run. Calculate the peak maximum bending moment acting on the center span.`,
                    correctAnswer: `${maxBendingMoment} kNm`,
                    distractors: [`${(load * length).toFixed(1)} kNm`, `${((load * length * length) / 4).toFixed(1)} kNm`, `${(maxBendingMoment - 12.5).toFixed(1)} kNm`],
                    rationale: `The peak bending moment equation for an evenly distributed load is M = (w * L²) / 8. Calculating gives: (${load} * ${length}²) / 8 = ${maxBendingMoment} kNm.`
                };
            },
            function() {
                const cutVol = Math.floor(Math.random() * 5000) + 8000;
                const fillVol = Math.floor(Math.random() * 4000) + 4000;
                const balance = cutVol - fillVol;
                return {
                    question: `A mass haul site analysis logs a localized excavation profile of ${cutVol} m³ of heavy soil cut, while the downroad highway leveling zone calls for ${fillVol} m³ of aggregate compact fill. What is the net volumetric earthwork status before accounting for soil swell factors?`,
                    correctAnswer: `${balance} m³ surplus (export required)`,
                    distractors: [`${balance} m³ deficit (import required)`, `${cutVol + fillVol} m³ balanced`, `0 m³ matrix net`],
                    rationale: `Net calculation = Cut Volume - Fill Volume (${cutVol} - ${fillVol} = ${balance} m³). Since the value is positive, it signifies an excess surplus layout.`
                };
            }
        ];

        function generateProceduralExam(targetCount) {
            let uniqueGeneratedSet = [];
            for (let i = 0; i < targetCount; i++) {
                const randomGeneratorIndex = Math.floor(Math.random() * questionGenerators.length);
                const generatedRawData = questionGenerators[randomGeneratorIndex]();

                let formattedQuestion = {
                    question: generatedRawData.question,
                    options: [
                        { text: generatedRawData.correctAnswer, isCorrect: true, rationale: generatedRawData.rationale },
                        { text: generatedRawData.distractors[0], isCorrect: false, rationale: "Incorrect calculated value variable path choice." },
                        { text: generatedRawData.distractors[1], isCorrect: false, rationale: "Incorrect mathematical scaling limit threshold value." },
                        { text: generatedRawData.distractors[2], isCorrect: false, rationale: "Incorrect equation optimization tracking choice." }
                    ]
                };

                formattedQuestion.options = shuffle(formattedQuestion.options);
                uniqueGeneratedSet.push(formattedQuestion);
            }
            return uniqueGeneratedSet;
        }

        // DOM Elements
        const quizWindow = document.getElementById('quiz-window');
        const resultsWindow = document.getElementById('results-window');
        const questionCounter = document.getElementById('question-counter');
        const progressBar = document.getElementById('progress-bar');
        const questionField = document.getElementById('question-field');
        const optionsField = document.getElementById('options-field');
        const rationaleField = document.getElementById('rationale-field');
        const nextBtn = document.getElementById('next-btn');
        const finalScoreField = document.getElementById('final-score');
        const performanceFeedback = document.getElementById('performance-feedback');

        // --- CRITICAL FIXED: THE COMPREHENSIVE RESET ENGINE ---
        function resetExamEngine() {
            // 1. Reset variables to absolute ground zero
            currentQuestionIndex = 0;
            runningScore = 0;
            isAnswerSelected = false;
            activeExamSet = [];

            // 2. Erase existing UI text fields and styling states 
            rationaleField.innerText = '';
            rationaleField.classList.remove('visible');
            optionsField.innerHTML = '';
            
            // 3. Reset buttons state securely
            nextBtn.disabled = true;
            nextBtn.innerText = "Submit Answer";

            // 4. Interface visibility swapping
            resultsWindow.style.display = 'none';
            quizWindow.style.display = 'block';

            // 5. Fire completely brand new randomized math formulas array
            activeExamSet = generateProceduralExam(TOTAL_QUESTIONS);

            // 6. Push freshly mounted question data to the window
            loadQuestion();
        }

        function loadQuestion() {
            isAnswerSelected = false;
            nextBtn.disabled = true;
            nextBtn.innerText = "Submit Answer";
            rationaleField.classList.remove('visible');
            optionsField.innerHTML = '';

            const currentQuestion = activeExamSet[currentQuestionIndex];
            
            questionCounter.innerText = `Question ${currentQuestionIndex + 1} of ${activeExamSet.length}`;
            progressBar.style.width = `${((currentQuestionIndex + 1) / activeExamSet.length) * 100}%`;
            questionField.innerText = currentQuestion.question;

            currentQuestion.options.forEach(option => {
                const button = document.createElement('button');
                button.classList.add('option-btn');
                button.innerText = option.text;
                button.addEventListener('click', () => handleOptionSelection(button, option));
                optionsField.appendChild(button);
            });
        }

        function handleOptionSelection(selectedButton, optionData) {
            if (isAnswerSelected) return;
            isAnswerSelected = true;

            const allButtons = optionsField.querySelectorAll('.option-btn');
            
            allButtons.forEach(btn => {
                btn.disabled = true; 
                const checkOption = activeExamSet[currentQuestionIndex].options.find(o => o.text === btn.innerText);
                if (checkOption.isCorrect) {
                    btn.classList.add('correct'); 
                }
            });

            if (optionData.isCorrect) {
                runningScore++;
            } else {
                selectedButton.classList.add('incorrect'); 
            }

            rationaleField.innerText = `System Calculation Derivation: ${optionData.rationale}`;
            rationaleField.classList.add('visible');

            nextBtn.disabled = false;
            if (currentQuestionIndex === activeExamSet.length - 1) {
                nextBtn.innerText = "Finish Assessment";
            } else {
                nextBtn.innerText = "Next Question";
            }
        }

        nextBtn.addEventListener('click', () => {
            if (currentQuestionIndex < activeExamSet.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                displayFinalScorecard();
            }
        });

        function displayFinalScorecard() {
            quizWindow.style.display = 'none';
            resultsWindow.style.display = 'block';
            finalScoreField.innerText = runningScore;

            const successRatio = (runningScore / TOTAL_QUESTIONS) * 100;

            if (successRatio >= 90) {
                performanceFeedback.innerText = "Master Elite Standard. Your calculations match professional architectural quality pipeline guidelines flawlessly.";
            } else if (successRatio >= 70) {
                performanceFeedback.innerText = "Solid computation work. Formula balancing parameters fall safely within normal construction limits.";
            } else {
                performanceFeedback.innerText = "Mathematical precision check required. Try running a new configuration set to optimize formula applications.";
            }
        }

        // Initialize exam upon system boot sequence
        window.onload = resetExamEngine;
    </script>
</body>
</html>
