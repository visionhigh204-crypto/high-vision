<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid al-Adha Cinematic Experience</title>
    <style>
        /* Base Setup */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050514;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Moving Starry Background */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat top center;
            z-index: 0;
            animation: moveStars 100s linear infinite;
            opacity: 0.5;
        }

        @keyframes moveStars {
            from { transform: translate(0, 0); }
            to { transform: translate(-50%, -50%); }
        }

        /* Intro Screen (The Workaround for Autoplay) */
        #intro {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #050514;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            cursor: pointer;
            transition: opacity 1.5s ease-out;
        }

        .tap-text {
            font-size: 1.5rem;
            color: #fbbf24;
            animation: pulseIntro 1.5s infinite;
            letter-spacing: 2px;
        }

        @keyframes pulseIntro {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        /* Canvas for Fireworks */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Main Cinematic Content */
        .content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
            opacity: 0; /* Hidden until play */
            pointer-events: none;
        }

        /* Cinematic Animations */
        .show-content .art-container {
            animation: slideDownFade 3s cubic-bezier(0.25, 1, 0.5, 1) forwards, float 4s ease-in-out infinite 3s;
        }

        .show-content h1 {
            animation: zoomInFade 4s cubic-bezier(0.25, 1, 0.5, 1) forwards, pulseGlow 2s infinite alternate 4s;
        }

        .show-content p {
            animation: slideUpFade 4s cubic-bezier(0.25, 1, 0.5, 1) 1s forwards;
        }

        .art-container {
            font-size: 100px;
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(-50px);
        }

        h1 {
            font-size: 4rem;
            color: #fbbf24;
            margin: 0;
            opacity: 0;
            transform: scale(0.8);
            text-shadow: 0 0 10px #fbbf24, 0 0 20px #fbbf24;
        }

        p {
            font-size: 1.5rem;
            color: #e2e8f0;
            max-width: 700px;
            margin-top: 20px;
            text-align: center;
            opacity: 0;
            transform: translateY(50px);
            line-height: 1.6;
        }

        /* Keyframes for the "Video" sequence */
        @keyframes slideDownFade {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes zoomInFade {
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        @keyframes pulseGlow {
            from { text-shadow: 0 0 15px #fbbf24, 0 0 30px #d97706; }
            to { text-shadow: 0 0 25px #fbbf24, 0 0 50px #f59e0b, 0 0 80px #d97706; }
        }
    </style>
</head>
<body>

    <!-- Starry Background -->
    <div class="stars"></div>

    <!-- Intro Screen / Play Button -->
    <div id="intro">
        <div class="tap-text">Tap anywhere to begin</div>
    </div>

    <!-- Canvas for Fireworks -->
    <canvas id="fireworksCanvas"></canvas>

    <!-- Main Content -->
    <div class="content" id="mainContent">
        <div class="art-container">🌙 🕌</div>
        <h1>Eid al-Adha Mubarak</h1>
        <p>May this special day bring peace, happiness, and prosperity to you and your family.</p>
    </div>
    
    <!-- Hidden Audio Element -->
    <audio id="eidMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        // --- CINEMATIC SEQUENCE & AUDIO LOGIC ---
        const intro = document.getElementById('intro');
        const mainContent = document.getElementById('mainContent');
        const audio = document.getElementById('eidMusic');
        let experienceStarted = false;

        intro.addEventListener('click', () => {
            if (!experienceStarted) {
                experienceStarted = true;
                
                // 1. Play Music
                audio.play();

                // 2. Fade out intro screen
                intro.style.opacity = '0';
                setTimeout(() => {
                    intro.style.display = 'none';
                }, 1500);

                // 3. Trigger Cinematic Text Animations
                mainContent.style.opacity = '1';
                mainContent.classList.add('show-content');

                // 4. Start Fireworks
                animate();
            }
        });

        // --- FIREWORKS CANVAS LOGIC ---
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        const particles = [];
        const colors = ['#fbbf24', '#f59e0b', '#ffffff', '#34d399', '#60a5fa'];

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.velocity = {
                    x: (Math.random() - 0.5) * 10,
                    y: (Math.random() - 0.5) * 10
                };
                this.alpha = 1;
                this.friction = 0.97;
                this.gravity = 0.04;
            }

            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2.5, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            update() {
                this.velocity.x *= this.friction;
                this.velocity.y *= this.friction;
                this.velocity.y += this.gravity;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
                this.alpha -= 0.012; 
                this.draw();
            }
        }

        function createFirework() {
            const x = Math.random() * canvas.width;
            const y = Math.random() * (canvas.height * 0.6);
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            for (let i = 0; i < 70; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(5, 5, 20, 0.2)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach((particle, index) => {
                if (particle.alpha > 0) {
                    particle.update();
                } else {
                    particles.splice(index, 1);
                }
            });

            if (Math.random() < 0.04) {
                createFirework();
            }
        }
    </script>
</body>
</html>
