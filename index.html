<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid al-Adha Graphic Experience</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0c0f26;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end; /* Aligns content toward bottom like a stage */
        }

        /* Click to Play Screen */
        #intro {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0c0f26;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            cursor: pointer;
            transition: opacity 1s ease;
        }

        .play-card {
            padding: 20px 40px;
            background: linear-gradient(135deg, #fbbf24, #d97706);
            color: #0c0f26;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(217, 119, 6, 0.4);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 10px 25px rgba(217, 119, 6, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 15px 35px rgba(217, 119, 6, 0.6); }
        }

        /* Vector Art Canvas */
        #artCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Typography Overlay */
        .ui-layer {
            position: relative;
            z-index: 2;
            margin-bottom: 12vh; /* Holds text perfectly above the vector horizon */
            pointer-events: none;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .ui-layer.active {
            opacity: 1;
            transform: translateY(0);
        }

        h1 {
            font-size: 3.8rem;
            margin: 0;
            color: #fef08a;
            text-shadow: 0 4px 15px rgba(0,0,0,0.6), 0 0 30px rgba(251, 191, 36, 0.3);
            letter-spacing: 1px;
        }

        p {
            font-size: 1.3rem;
            color: #e2e8f0;
            max-width: 550px;
            margin: 15px auto 0 auto;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
            line-height: 1.6;
        }

        .signature {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            font-size: 0.85rem;
            letter-spacing: 3px;
            color: rgba(254, 240, 138, 0.5);
            text-transform: uppercase;
        }
    </style>
    </head>
<body>

    <div id="intro">
        <div class="play-card">✨ ENTER EID EXPERIENCE ✨</div>
    </div>

    <canvas id="artCanvas"></canvas>

    <div class="ui-layer" id="textDisplay">
        <h1>Eid al-Adha Mubarak</h1>
        <p>May your faith and devotion be rewarded with supreme blessings, peace, and endless joy.</p>
    </div>

    <div class="signature">Admin System Tracking</div>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('artCanvas');
        const ctx = canvas.getContext('2d');
        const intro = document.getElementById('intro');
        const textDisplay = document.getElementById('textDisplay');
        const audio = document.getElementById('bgMusic');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Interactive states
        let pulseDirection = 1;
        let glowScale = 0;
        const stars = Array.from({ length: 60 }, () => ({
            x: Math.random(),
            y: Math.random() * 0.6,
            size: Math.random() * 2 + 0.5,
            speed: 0.01 + Math.random() * 0.02,
            phase: Math.random() * Math.PI
        }));

        // --- JAVASCRIPT VECTOR DRAWING ENGINE ---
        function drawVectorArt() {
            // 1. Draw Sky Gradient
            let skyGrad = ctx.createLinearGradient(0, 0, 0, height);
            skyGrad.addColorStop(0, '#060814');
            skyGrad.addColorStop(0.5, '#0c112d');
            skyGrad.addColorStop(1, '#1b173d');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, width, height);

            // 2. Draw Twinkling JS Stars
            stars.forEach(s => {
                s.phase += s.speed;
                let alpha = (Math.sin(s.phase) + 1) / 2 * 0.8 + 0.2;
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(s.x * width, s.y * height, s.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Dynamic bounce modifiers
            glowScale += 0.005 * pulseDirection;
            if(glowScale > 1 || glowScale < 0) pulseDirection *= -1;
            let dynamicOffset = Math.sin(glowScale * Math.PI) * 8;

            // 3. Draw Stylized Graphic Crescent Moon
            const moonX = width * 0.5;
            const moonY = height * 0.32 + (dynamicOffset * 0.3);
            
            ctx.shadowBlur = 40 + (dynamicOffset * 2);
            ctx.shadowColor = 'rgba(251, 191, 36, 0.4)';
            
            ctx.fillStyle = '#fef08a';
            ctx.beginPath();
            ctx.arc(moonX, moonY, 70, 0, Math.PI * 2);
            ctx.fill();
            
            // Masking cut out to form the perfect crescent shape
            ctx.shadowBlur = 0; 
            ctx.fillStyle = skyGrad; 
            ctx.beginPath();
            ctx.arc(moonX + 22, moonY - 10, 65, 0, Math.PI * 2);
            ctx.fill();

            // 4. Draw Layered Vector Islamic Mosque Silhouette (Bottom Horizon)
            ctx.shadowBlur = 0;
            const baseWidth = Math.min(600, width * 0.9);
            const startX = (width - baseWidth) / 2;
            const horizon = height * 0.95;

            // Gradient composition for vector graphic feel
            let architectureGrad = ctx.createLinearGradient(0, height * 0.5, 0, height);
            architectureGrad.addColorStop(0, '#2d2159');
            architectureGrad.addColorStop(1, '#130d2b');
            ctx.fillStyle = architectureGrad;

            ctx.beginPath();
            // Main structure block
            ctx.rect(startX, horizon - 80, baseWidth, 80);
            
            // Central dome build
            const center = width / 2;
            ctx.moveTo(center - 70, horizon - 80);
            ctx.quadraticCurveTo(center - 70, horizon - 160, center, horizon - 160);
            ctx.quadraticCurveTo(center + 70, horizon - 160, center + 70, horizon - 80);

            // Left Minaret tower
            ctx.rect(startX + 30, horizon - 210, 25, 130);
            ctx.moveTo(startX + 25, horizon - 210);
            ctx.lineTo(startX + 42.5, horizon - 245);
            ctx.lineTo(startX + 60, horizon - 210);

            // Right Minaret tower
            ctx.rect(startX + baseWidth - 55, horizon - 210, 25, 130);
            ctx.moveTo(startX + baseWidth - 60, horizon - 210);
            ctx.lineTo(startX + baseWidth - 42.5, horizon - 245);
            ctx.lineTo(startX + baseWidth - 25, horizon - 210);

            ctx.closePath();
            ctx.fill();
        }

        // Render Loop running graphics dynamically
        function runGraphicsEngine() {
            drawVectorArt();
            requestAnimationFrame(runGraphicsEngine);
        }

        // Audio and Screen Reveal handling
        intro.addEventListener('click', () => {
            audio.play();
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                textDisplay.classList.add('active');
            }, 1000);
        });

        // Initialize engine
        runGraphicsEngine();
    </script>
</body>
</html>
